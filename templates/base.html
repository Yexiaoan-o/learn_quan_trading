<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}量化交易学习平台{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    {% block head %}{% endblock %}
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="/" class="logo">
                    <span class="logo-icon">&#x1F4CA;</span>
                    <span class="logo-text">量化学习平台</span>
                </a>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <a href="/" class="nav-item {% if request.url.path == '/' %}active{% endif %}">
                        <span class="nav-icon">&#x1F3E0;</span> 学习仪表盘
                    </a>
                    <a href="/progress" class="nav-item {% if request.url.path == '/progress' %}active{% endif %}">
                        <span class="nav-icon">&#x1F4CA;</span> 学习进度
                    </a>
                    <a href="/notes" class="nav-item {% if request.url.path == '/notes' %}active{% endif %}">
                        <span class="nav-icon">&#x1F4DD;</span> 学习笔记
                    </a>
                    <a href="/settings" class="nav-item {% if request.url.path == '/settings' %}active{% endif %}">
                        <span class="nav-icon">&#x2699;</span> 模型设置
                    </a>
                </div>
                <div class="nav-section">
                    <div class="nav-section-title">课程目录</div>
                    {% for phase in phases %}
                    <div class="nav-phase expanded">
                        <div class="nav-phase-title" onclick="togglePhase(this)">
                            <span class="phase-toggle">&#x25BC;</span>
                            {{ phase.phase_title }}
                        </div>
                        <div class="nav-phase-chapters">
                            {% for ch in phase.chapters %}
                            <a href="/chapter/{{ ch.id }}" class="nav-chapter {% if chapter and chapter.id == ch.id %}active{% endif %}">
                                <span class="chapter-dot"></span>
                                {{ ch.title }}
                            </a>
                            {% endfor %}
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <button class="sidebar-toggle" onclick="toggleSidebar()" title="切换侧边栏">&#x2630;</button>
                <div class="top-bar-search">
                    <form action="/search" method="get" class="search-form">
                        <input type="text" name="q" placeholder="搜索课程内容..." value="{{ query|default('') }}">
                        <button type="submit">&#x1F50D;</button>
                    </form>
                </div>
                <div class="top-bar-actions">
                    <button class="theme-toggle" onclick="toggleTheme()" title="切换暗色模式">
                        <span class="theme-icon">&#x1F319;</span>
                    </button>
                </div>
            </header>

            <div class="content-area {% block content_area_class %}{% endblock %}">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <div class="selection-popover hidden" id="selection-popover">
        <button class="btn btn-sm btn-primary" id="selection-comment-btn">添加评论</button>
    </div>

    <div class="modal hidden" id="annotation-modal">
        <div class="modal-backdrop" data-close-modal="annotation-modal"></div>
        <div class="modal-dialog">
            <div class="modal-header-row">
                <h3>划词评论</h3>
                <button class="modal-close" data-close-modal="annotation-modal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="annotation-preview" id="annotation-selected-text"></div>
                <textarea id="annotation-comment-input" class="note-input" placeholder="输入你的问题或评论"></textarea>
                <div class="modal-actions-row">
                    <button class="btn btn-outline" id="annotation-save-btn">保存评论</button>
                    <button class="btn btn-primary" id="annotation-ask-btn">发送给 AI</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal hidden" id="ai-answer-modal">
        <div class="modal-backdrop" data-close-modal="ai-answer-modal"></div>
        <div class="modal-dialog modal-dialog-wide">
            <div class="modal-header-row">
                <h3>AI 回答</h3>
                <button class="modal-close" data-close-modal="ai-answer-modal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="ai-answer-box markdown-body" id="ai-answer-content"></div>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
